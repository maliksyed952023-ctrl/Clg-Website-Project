<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background-color: #f4f7fb;
    color: #333;
}

/* Top blue header */
.header {
    background-color: #0b4f8a;
    padding: 25px 40px;
}

.header h1 {
    margin: 0;
    color: #ffffff;
    font-size: 30px;
    font-weight: 700;
}

/* Main white box */
.content-box {
    max-width: 900px;
    margin: 40px auto;
    background: #ffffff;
    padding: 35px 40px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.section-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
    color: #0b4f8a;
}

.contact-item {
    margin-bottom: 15px;
    font-size: 15px;
    line-height: 1.6;
}

.contact-item strong {
    display: inline-block;
    width: 120px;
}

/* Map */
.map {
    margin-top: 30px;
    border-radius: 6px;
    overflow: hidden;
}
</style>
</head>

<body>

<!-- Page Heading -->
<div class="header">
    <h1>Contact Us</h1>
</div>

<!-- Content -->
<div class="content-box">

    <div class="section-title">
        Government Polytechnic, Chh. Sambhajinagar
    </div>

    <div class="contact-item">
        <strong>Address:</strong>
        Osmanpura, Chh. Sambhajinagar – 431005
    </div>

    <div class="contact-item">
        <strong>Phone:</strong>
        0240-XXXXXXX
    </div>

    <div class="contact-item">
        <strong>Email:</strong>
        gpchh.sambhajinagar@dtemaharashtra.gov.in
    </div>

    <div class="contact-item">
        <strong>Office Hours:</strong>
        Monday to Friday – 10:00 AM to 5:00 PM
    </div>

    <div class="section-title" style="margin-top:30px;">
        College Location
    </div>

    <div class="map">
        <iframe
            src="https://www.google.com/maps?q=Government%20Polytechnic%20Aurangabad&output=embed"
            width="100%"
            height="350"
            style="border:0;"
            allowfullscreen=""
            loading="lazy">
        </iframe>
    </div>

</div>

</body>
</html>
