<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Website – Skeleton</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }
    header, footer {
      background: #0f4c5c;
      color: white;
      padding: 15px;
      text-align: center;
    }
    nav {
      background: #e0e0e0;
      padding: 10px;
      text-align: center;
    }
    main {
      padding: 20px;
    }

    section {
      border: 1px dashed #aaa;
      padding: 15px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<header>
  <h2>Government Polytechnic, Chhatrapati Sambhajinagar</h2>
</header>

<nav>
  Home | About | Departments | Admission | Contact
</nav>

<main>

  <<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Website</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- TENDERS SECTION -->
    <section class="info-box" id="tenders-section">

        <div class="info-title">
            📄 Tenders & Quotations

            <div style="float:right;">
                <label>View:</label>
                <select id="yearSelect">
                    <option value="all">All</option>
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                </select>
            </div>
        </div>

        <table class="info-table">
           <thead>
  <tr>
    <th style="width:15%;">Date</th>
    <th style="width:65%;">Description</th>
    <th style="width:20%;">Download</th>
  </tr>
</thead>

            <tbody id="tenderBody"></tbody>
        </table>

        <div class="center">
            <button class="more-btn" id="moreBtn">View More</button>
        </div>

    </section>

    <!-- JS -->
    <script src="js/script.js"></script>
</body>
</html>

>

</main>

<footer>
  © 2026 Government Polytechnic – Skeleton Version
</footer>

</body>
</html>
